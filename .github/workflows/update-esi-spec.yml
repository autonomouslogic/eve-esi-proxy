name: Check ESI Spec
on:
  workflow_dispatch:
  schedule:
    - cron: "30 12 * * *"
env:
  DEV_NOTICES_DISCORD_WEBHOOK_URL: ${{ secrets.DEV_NOTICES_DISCORD_WEBHOOK_URL }}
permissions:
  contents: write
jobs:
  Check:
    timeout-minutes: 30
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Install jq
        run: sudo apt install -y jq

      - name: Update
        run: |
          ./.github/run-make-and-check-changes.sh update-esi-spec "$DEV_NOTICES_DISCORD_WEBHOOK_URL" "fix: Updated ESI spec"
